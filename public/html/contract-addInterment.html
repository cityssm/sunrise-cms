<div class="modal" role="dialog" aria-label="Add Recipient">
  <div class="modal-background"></div>
  <div class="modal-card">
    <div class="modal-card-head">
      <h3 class="modal-card-title">Add Recipient</h3>
      <button
        class="delete is-close-modal-button"
        type="button"
        aria-label="close"
      ></button>
    </div>
    <section class="modal-card-body">
      <form id="form--contractIntermentAdd">
        <input
          id="contractIntermentAdd--contractId"
          name="contractId"
          type="hidden"
          value=""
        />
        <div class="columns">
          <div class="column">
            <div class="field">
              <label class="label" for="contractIntermentAdd--deceasedName">
                Name
              </label>
              <div class="control has-icons-right">
                <input
                  class="input"
                  id="contractIntermentAdd--deceasedName"
                  name="deceasedName"
                  type="text"
                  maxlength="200"
                  autocomplete="off"
                  required
                />
                <span class="icon is-right">
                  <i class="fa-solid fa-asterisk"></i>
                </span>
              </div>
            </div>
          </div>
        </div>
        <div class="field">
          <label class="label" for="contractIntermentAdd--deceasedAddress1">
            Address
          </label>
          <div class="control">
            <input
              class="input"
              id="contractIntermentAdd--deceasedAddress1"
              name="deceasedAddress1"
              type="text"
              maxlength="50"
              placeholder="Line 1"
              autocomplete="off"
            />
          </div>
        </div>
        <div class="field">
          <div class="control">
            <input
              class="input"
              id="contractIntermentAdd--deceasedAddress2"
              name="deceasedAddress2"
              type="text"
              maxlength="50"
              aria-label="Address Line 2"
              placeholder="Line 2"
              autocomplete="off"
            />
          </div>
        </div>
        <div class="columns">
          <div class="column">
            <div class="field">
              <label class="label" for="contractIntermentAdd--deceasedCity">
                City
              </label>
              <div class="control">
                <input
                  class="input"
                  id="contractIntermentAdd--deceasedCity"
                  name="deceasedCity"
                  type="text"
                  maxlength="20"
                  list="datalist--cityDefault"
                />
              </div>
            </div>
          </div>
          <div class="column">
            <div class="field">
              <label class="label" for="contractIntermentAdd--deceasedProvince">
                Province
              </label>
              <div class="control">
                <input
                  class="input"
                  id="contractIntermentAdd--deceasedProvince"
                  name="deceasedProvince"
                  type="text"
                  maxlength="2"
                />
              </div>
            </div>
          </div>
          <div class="column">
            <div class="field">
              <label
                class="label"
                for="contractIntermentAdd--deceasedPostalCode"
              >
                Postal Code
              </label>
              <div class="control">
                <input
                  class="input"
                  id="contractIntermentAdd--deceasedPostalCode"
                  name="deceasedPostalCode"
                  type="text"
                  minlength="5"
                  maxlength="7"
                  autocomplete="off"
                  pattern="^[A-Z\d \-]+$"
                />
              </div>
            </div>
          </div>
        </div>
        <div class="columns">
          <div class="column">
            <div class="field">
              <label class="label">
                Date of Birth
              </label>
              <div class="field has-addons">
                <div class="control">
                  <input
                    class="input"
                    id="contractIntermentAdd--birthYear"
                    name="birthYear"
                    type="number"
                    placeholder="YYYY"
                    min="1"
                    max="9999"
                    style="width: 6rem"
                  />
                </div>
                <div class="control">
                  <span class="button is-static">&#8211;</span>
                </div>
                <div class="control">
                  <input
                    class="input"
                    id="contractIntermentAdd--birthMonth"
                    name="birthMonth"
                    type="number"
                    placeholder="MM"
                    min="1"
                    max="12"
                    style="width: 4.5rem"
                  />
                </div>
                <div class="control">
                  <span class="button is-static">&#8211;</span>
                </div>
                <div class="control">
                  <input
                    class="input"
                    id="contractIntermentAdd--birthDay"
                    name="birthDay"
                    type="number"
                    placeholder="DD"
                    min="1"
                    max="31"
                    style="width: 4.5rem"
                  />
                </div>
              </div>
            </div>
          </div>
          <div class="column">
            <div class="field">
              <label class="label" for="contractIntermentAdd--birthPlace">
                Place of Birth
              </label>
              <div class="control">
                <input
                  class="input"
                  id="contractIntermentAdd--birthPlace"
                  name="birthPlace"
                  type="text"
                  maxlength="100"
                  autocomplete="off"
                  list="datalist--cityDefault"
                />
              </div>
            </div>
          </div>
        </div>
        <div class="columns">
          <div class="column">
            <div class="field">
              <label class="label">
                Date of Death
              </label>
              <div class="field has-addons">
                <div class="control">
                  <input
                    class="input"
                    id="contractIntermentAdd--deathYear"
                    name="deathYear"
                    type="number"
                    placeholder="YYYY"
                    min="1"
                    max="9999"
                    style="width: 6rem"
                  />
                </div>
                <div class="control">
                  <span class="button is-static">&#8211;</span>
                </div>
                <div class="control">
                  <input
                    class="input"
                    id="contractIntermentAdd--deathMonth"
                    name="deathMonth"
                    type="number"
                    placeholder="MM"
                    min="1"
                    max="12"
                    style="width: 4.5rem"
                  />
                </div>
                <div class="control">
                  <span class="button is-static">&#8211;</span>
                </div>
                <div class="control">
                  <input
                    class="input"
                    id="contractIntermentAdd--deathDay"
                    name="deathDay"
                    type="number"
                    placeholder="DD"
                    min="1"
                    max="31"
                    style="width: 4.5rem"
                  />
                </div>
              </div>
            </div>
          </div>
          <div class="column">
            <div class="field">
              <label class="label" for="contractIntermentAdd--deathPlace">
                Place of Death
              </label>
              <div class="control">
                <input
                  class="input"
                  id="contractIntermentAdd--deathPlace"
                  name="deathPlace"
                  type="text"
                  maxlength="100"
                  autocomplete="off"
                  list="datalist--cityDefault"
                />
              </div>
            </div>
          </div>
        </div>
        <label class="label" for="contractIntermentAdd--deathAge">
          Death Age
        </label>
        <div class="field has-addons">
          <div class="control">
            <button
              class="button"
              id="button--calculateDeathAge"
              type="button"
              aria-label="Calculate Age"
              disabled
            >
              <span class="icon is-small">
                <i class="fa-solid fa-calculator"></i>
              </span>
            </button>
          </div>
          <div class="control is-expanded">
            <input
              class="input has-text-right"
              id="contractIntermentAdd--deathAge"
              name="deathAge"
              type="number"
              min="0"
              max="150"
            />
          </div>
          <div class="control is-expanded">
            <div class="select is-fullwidth">
              <select
                id="contractIntermentAdd--deathAgePeriod"
                name="deathAgePeriod"
                aria-label="Death Age Period"
              ></select>
            </div>
          </div>
        </div>
        <div class="columns">
          <div class="column">
            <div class="field">
              <label
                class="label"
                for="contractIntermentAdd--intermentContainerTypeId"
              >
                Container
              </label>
              <div class="control">
                <div class="select is-fullwidth">
                  <select
                    id="contractIntermentAdd--intermentContainerTypeId"
                    name="intermentContainerTypeId"
                  >
                    <option value="">(No Container)</option>
                    <optgroup
                      data-is-cremation-type="0"
                      label="Non-Cremated"
                    ></optgroup>
                    <optgroup
                      data-is-cremation-type="1"
                      label="Cremated"
                    ></optgroup>
                  </select>
                </div>
              </div>
            </div>
          </div>
          <div class="column">
            <div class="field">
              <label class="label" for="contractIntermentAdd--intermentDepthId">
                Depth
              </label>
              <div class="control">
                <div class="select is-fullwidth">
                  <select
                    id="contractIntermentAdd--intermentDepthId"
                    name="intermentDepthId"
                  >
                    <option value="">(No Depth)</option>
                  </select>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="field">
          <label class="label" for="contractIntermentAdd--findagraveMemorialId">
            Find a Grave Memorial ID
          </label>
          <div class="control">
            <input
              class="input"
              id="contractIntermentAdd--findagraveMemorialId"
              name="findagraveMemorialId"
              type="text"
              inputmode="numeric"
              pattern="\d*"
            />
          </div>
        </div>
      </form>
    </section>
    <div class="modal-card-foot is-justify-content-right">
      <div class="buttons">
        <button
          class="button is-success"
          type="submit"
          form="form--contractIntermentAdd"
        >
          <span class="icon"><i class="fa-solid fa-plus"></i></span>
          <span>Add Recipient</span>
        </button>
        <button class="button is-close-modal-button" type="button">
          Cancel
        </button>
      </div>
    </div>
  </div>
</div>
