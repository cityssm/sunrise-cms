<div class="modal" role="dialog" aria-label="Set Fee Amount">
  <div class="modal-background"></div>
  <div class="modal-card">
    <div class="modal-card-head">
      <h3 class="modal-card-title">Set Fee Amount</h3>
      <button
        class="delete is-close-modal-button"
        type="button"
        aria-label="close"
      ></button>
    </div>
    <section class="modal-card-body">
      <form id="form--contractFeeAmount">
        <label class="label" for="contractFeeAmount--feeAmount">
          Fee Amount
        </label>
        <div class="field has-addons">
          <div class="control">
            <span class="button is-static">$</span>
          </div>
          <div class="control is-expanded">
            <input
              class="input"
              id="contractFeeAmount--feeAmount"
              name="feeAmount"
              type="number"
              value=""
              min="0"
              step="0.01"
              onwheel="return false"
              required
            />
          </div>
        </div>
      </form>
    </section>
    <div class="modal-card-foot is-justify-content-right">
      <div class="buttons">
        <button
          class="button is-success"
          type="submit"
          form="form--contractFeeAmount"
        >
          <span class="icon"><i class="fa-solid fa-plus"></i></span>
          <span>Set Amount and Add Fee</span>
        </button>
        <button class="button is-close-modal-button" type="button">
          Cancel
        </button>
      </div>
    </div>
  </div>
</div>
